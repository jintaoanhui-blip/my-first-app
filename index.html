<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="todo-app">
    <h1>待办事项</h1>

    <div class="input-area">
      <input id="taskInput" type="text" placeholder="输入一个任务">
      <button id="addButton">添加</button>
    </div>

    <div>
      <button id="allButton">全部</button>
      <button id="activeButton">未完成</button>
      <button id="completedButton">已完成</button>
    </div>

    <p id="countText">未完成：0 个</p>

    <ul id="taskList"></ul>
  </main>

  <script src="script.js"></script>
</body>
</html>
