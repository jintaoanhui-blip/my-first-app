<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="userMenuButton" class="user-menu-button" aria-haspopup="dialog">登录</button>

  <div id="authModal" class="auth-modal" aria-hidden="true">
    <div class="auth-dialog" role="dialog" aria-modal="true" aria-labelledby="authTitle">
      <button id="closeAuthButton" class="close-auth-button" aria-label="关闭">×</button>
      <h2 id="authTitle">账户</h2>

      <div id="authForm">
        <input id="authEmail" type="email" placeholder="邮箱">
        <input id="authPassword" type="password" placeholder="密码">
        <div class="auth-actions">
          <button id="signInButton">登录</button>
          <button id="signUpButton">注册</button>
        </div>
      </div>

      <div id="userPanel" class="user-panel">
        <p id="currentUserText"></p>
        <button id="signOutButton" class="secondary-button">退出登录</button>
      </div>

      <p id="authStatus" class="auth-status">未登录</p>
    </div>
  </div>

  <main class="todo-app">
    <h1>待办事项</h1>

    <div class="input-area">
      <input id="taskInput" type="text" placeholder="请输入任务">
      <button id="addButton">添加</button>
      <button id="aiButton">AI 拆解任务</button>
    </div>

    <p id="aiError" class="error-message"></p>
    <p id="todoNotice" class="notice-message"></p>

    <div>
      <button id="allButton">全部</button>
      <button id="activeButton">未完成</button>
      <button id="completedButton">已完成</button>
      <button id="clearButton">清空全部</button>
    </div>

    <p id="countText">未完成：0 个</p>

    <ul id="taskList"></ul>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
